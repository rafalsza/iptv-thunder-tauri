<svg width="200" height="40" viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- TV/Screen icon -->
  <rect x="4" y="8" width="32" height="24" rx="3" fill="url(#iconGradient)" />
  <rect x="7" y="11" width="26" height="18" rx="2" fill="#0f172a" opacity="0.6"/>
  
  <!-- Play triangle -->
  <polygon points="16,15 16,26 26,20.5" fill="white" opacity="0.9"/>
  
  <!-- Thunder bolt -->
  <path d="M 20 4 L 28 14 L 35 11 L 42 24 L 35 16 L 28 19 Z" 
        fill="#fbbf24" 
        stroke="#f59e0b" 
        stroke-width="1"
        opacity="0.95"/>
  
  <!-- Signal waves -->
  <path d="M 38 6 Q 44 9, 44 14" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
  <path d="M 40 4 Q 48 8, 48 14" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Text "IPTV" -->
  <text x="52" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white" letter-spacing="1">IPTV</text>
  
  <!-- Text "THUNDER" -->
  <text x="98" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#fbbf24" letter-spacing="1">THUNDER</text>
</svg>
