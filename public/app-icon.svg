<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="80" fill="#0f172a" />
  
  <!-- TV/Screen icon - centered and scaled -->
  <rect x="106" y="156" width="300" height="200" rx="24" fill="url(#iconGradient)" />
  <rect x="126" y="176" width="260" height="160" rx="16" fill="#0f172a" opacity="0.6"/>
  
  <!-- Play triangle - centered -->
  <polygon points="210,220 210,310 302,265" fill="white" opacity="0.9"/>
  
  <!-- Thunder bolt - scaled and positioned -->
  <path d="M 230 110 L 300 200 L 380 180 L 460 310 L 380 230 L 300 250 Z" 
        fill="#fbbf24" 
        stroke="#f59e0b" 
        stroke-width="4"
        opacity="0.95"/>
  
  <!-- Signal waves -->
  <path d="M 400 140 Q 460 170, 460 220" fill="none" stroke="#60a5fa" stroke-width="12" opacity="0.7"/>
  <path d="M 410 110 Q 490 150, 490 220" fill="none" stroke="#60a5fa" stroke-width="12" opacity="0.5"/>
</svg>
